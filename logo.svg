<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="16" fill="url(#bg)" />

  <!-- Log1p curve (forward) - faded -->
  <path d="M 25 95 Q 40 55, 55 45 Q 70 35, 85 30 Q 100 26, 115 24"
        stroke="#334155" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Arrow showing reversal -->
  <path d="M 75 58 L 65 52 M 75 58 L 65 64"
        stroke="url(#accent)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="75" y1="58" x2="55" y2="58"
        stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>

  <!-- Count bars (discrete, recovered) -->
  <rect x="30" y="78" width="6" height="17" rx="1.5" fill="#e94560" opacity="0.9"/>
  <rect x="40" y="68" width="6" height="27" rx="1.5" fill="#e94560" opacity="0.8"/>
  <rect x="50" y="83" width="6" height="12" rx="1.5" fill="#e94560" opacity="0.7"/>
  <rect x="60" y="73" width="6" height="22" rx="1.5" fill="#ff6b6b" opacity="0.8"/>
  <rect x="70" y="88" width="6" height="7"  rx="1.5" fill="#ff6b6b" opacity="0.6"/>
  <rect x="80" y="63" width="6" height="32" rx="1.5" fill="#ff6b6b" opacity="0.9"/>
  <rect x="90" y="78" width="6" height="17" rx="1.5" fill="#e94560" opacity="0.7"/>
  <rect x="100" y="85" width="6" height="10" rx="1.5" fill="#e94560" opacity="0.6"/>
  <rect x="110" y="70" width="6" height="25" rx="1.5" fill="#ff6b6b" opacity="0.8"/>

  <!-- Text: stan -->
  <text x="140" y="72" font-family="'SF Mono','Fira Code','Cascadia Code',monospace"
        font-size="42" font-weight="300" fill="#94a3b8" letter-spacing="-1">stan</text>

  <!-- Text: counts -->
  <text x="258" y="72" font-family="'SF Mono','Fira Code','Cascadia Code',monospace"
        font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="-1">counts</text>

  <!-- Tagline -->
  <text x="140" y="96" font-family="'Inter','Helvetica Neue',sans-serif"
        font-size="13" fill="#64748b" letter-spacing="0.5">log1p(x) → counts</text>

  <!-- Formula badge -->
  <rect x="280" y="84" width="160" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="360" y="99" font-family="'SF Mono',monospace" font-size="11" fill="#e94560"
        text-anchor="middle" letter-spacing="0.3">round(expm1(y)/sf)</text>
</svg>
